<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post to the Message Board</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f7ff, #fff3e8);
      color: #222;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(90%, 520px);
      padding: 32px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.5;
    }

    .form {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    input {
      padding: 14px;
      border: 2px solid #d7dce5;
      border-radius: 12px;
      font-size: 1.1rem;
    }

    input:focus {
      border-color: #3578e5;
      outline: none;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #3578e5;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }

    button:hover {
      background: #225db5;
    }

    #result {
      min-height: 28px;
      padding: 14px;
      border-radius: 12px;
      background: #f5f7fb;
      font-weight: bold;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1>Post to the Message Board</h1>
    <p>Type a message and post it to the shared board.</p>

    <section class="form">
      <input id="message-input" type="text" placeholder="Say something...">
      <button id="post-button" type="button">Post Message</button>
      <div id="result" aria-live="polite">Your posted message will show up here.</div>
    </section>
  </main>

  <script>
    const TOKEN = 'advikaadvika'; // <- your first name, twice

    async function postMessage(text) {
      const response = await fetch('https://oim.zhili.dev/message', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Token': TOKEN
        },
        body: JSON.stringify({ message: text })
      });
      return response.json();
    }

    const messageInput = document.getElementById('message-input');
    const postButton = document.getElementById('post-button');
    const result = document.getElementById('result');

    postButton.addEventListener('click', async () => {
      const text = messageInput.value.trim();
      if (!text) {
        result.textContent = 'Type a message first.';
        return;
      }

      result.textContent = 'Posting...';
      try {
        const data = await postMessage(text);
        result.textContent = `Posted! Server response: ${JSON.stringify(data)}`;
        messageInput.value = '';
      } catch (error) {
        result.textContent = `Something went wrong: ${error.message}`;
      }
    });
  </script>
</body>
</html>

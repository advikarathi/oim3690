<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · Advika Rathi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
    <style>
        :root {
            --cream: #f5f0e8;
            --ink: #1a1612;
            --rust: #b5451b;
            --muted: #7a7168;
            --line: #d4cfc6;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: 18px;
            line-height: 1.7;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .wrapper {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */

        header {
            padding: 5rem 0 3rem;
            border-bottom: 1px solid var(--line);
            opacity: 0;
            animation: fadeUp 0.9s ease forwards;
        }

        .eyebrow {
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 1.2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        h1 em {
            font-style: italic;
            color: var(--rust);
        }

        /* ── NAV ── */

        nav {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 1rem 0;
            border-bottom: 1px solid var(--line);
            opacity: 0;
            animation: fadeUp 0.9s 0.15s ease forwards;
        }

        .nav-toggle {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            z-index: 10;
        }

        .nav-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--ink);
            transition: transform 0.3s, opacity 0.3s;
        }

        nav.nav-open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        nav.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
        nav.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        nav ul {
            list-style: none;
            display: none;
            flex-direction: column;
            gap: 1.2rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--cream);
            padding: 4.5rem 2rem 1.5rem;
            border-bottom: 1px solid var(--line);
            z-index: 5;
        }

        nav.nav-open ul { display: flex; }

        nav a {
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover,
        nav a[aria-current="page"] { color: var(--rust); }

        @media (min-width: 640px) {
            .nav-toggle { display: none; }
            nav { justify-content: flex-start; padding: 1.4rem 0; }
            nav ul {
                display: flex;
                flex-direction: row;
                gap: 2.5rem;
                position: static;
                background: none;
                padding: 0;
                border: none;
            }
        }

        /* ── FORM SECTION ── */

        .form-section {
            padding: 4rem 0;
            border-bottom: 1px solid var(--line);
            opacity: 0;
            animation: fadeUp 0.9s 0.3s ease forwards;
        }

        .section-label {
            font-family: "DM Mono", monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: -0.01em;
            margin-bottom: 0.6rem;
        }

        .form-intro {
            color: #3d3830;
            font-size: 1.05rem;
            max-width: 560px;
            margin-bottom: 2.5rem;
        }

        /* ── FORM FIELDS ── */

        form {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            max-width: 560px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        label {
            font-family: "DM Mono", monospace;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        label .required-mark {
            color: var(--rust);
            margin-left: 0.2em;
        }

        input,
        select,
        textarea {
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: 1rem;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--line);
            padding: 0.5rem 0;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        /* focus state */
        input:focus,
        select:focus,
        textarea:focus {
            border-bottom-color: var(--rust);
        }

        /* invalid after interaction */
        input:user-invalid,
        select:user-invalid,
        textarea:user-invalid {
            border-bottom-color: #c0392b;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        /* select arrow */
        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: "↓";
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            color: var(--muted);
            position: absolute;
            right: 0.2rem;
            bottom: 0.6rem;
            pointer-events: none;
        }

        select option {
            background: var(--cream);
        }

        /* ── SUBMIT BUTTON ── */

        .submit-btn {
            font-family: "DM Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--cream);
            background: var(--ink);
            border: 1px solid var(--ink);
            padding: 0.85rem 2rem;
            cursor: pointer;
            align-self: flex-start;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .submit-btn:hover {
            background: var(--rust);
            border-color: var(--rust);
        }

        .submit-btn:focus-visible {
            outline: 2px solid var(--rust);
            outline-offset: 3px;
        }

        /* ── FOOTER ── */

        footer {
            padding: 2.5rem 0;
            opacity: 0;
            animation: fadeUp 0.9s 0.45s ease forwards;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        footer p {
            font-family: "DM Mono", monospace;
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* ── ANIMATION ── */

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── MOBILE ── */

        @media (max-width: 639px) {
            header { padding: 2.5rem 0 1.8rem; }
            .wrapper { padding: 0 1.2rem; }
            .field-row { grid-template-columns: 1fr; }
            .submit-btn { width: 100%; text-align: center; }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <p class="eyebrow">Portfolio · 2026</p>
            <h1>Advika <em>Rathi</em></h1>
        </header>

        <nav id="main-nav">
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="index.html#interests">Interests</a></li>
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>

        <section class="form-section">
            <p class="section-label">Contact</p>
            <h2>Let's connect.</h2>
            <p class="form-intro">
                Open to internships, collaborations, and conversations about marketing and AI. Fill out the form and I'll get back to you.
            </p>

            <form action="https://oim.zhili.dev/echo/view" method="POST">

                <div class="field-row">
                    <div class="field">
                        <label for="name">Name <span class="required-mark" aria-hidden="true">*</span></label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Your full name"
                            required
                            autocomplete="name"
                        />
                    </div>

                    <div class="field">
                        <!-- tel is the new input type used here -->
                        <label for="phone">Phone <span class="required-mark" aria-hidden="true">*</span></label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+1 (555) 000-0000"
                            required
                            autocomplete="tel"
                        />
                    </div>
                </div>

                <div class="field">
                    <label for="email">Email <span class="required-mark" aria-hidden="true">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    />
                </div>

                <div class="field">
                    <label for="subject">Subject <span class="required-mark" aria-hidden="true">*</span></label>
                    <div class="select-wrap">
                        <select id="subject" name="subject" required>
                            <option value="" disabled selected>Select a topic</option>
                            <option value="internship">Internship opportunity</option>
                            <option value="collaboration">Collaboration</option>
                            <option value="marketing">Marketing &amp; AI</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label for="message">Message <span class="required-mark" aria-hidden="true">*</span></label>
                    <textarea
                        id="message"
                        name="message"
                        placeholder="What's on your mind?"
                        required
                    ></textarea>
                </div>

                <button type="submit" class="submit-btn">Send message →</button>
            </form>
        </section>

        <footer>
            <div class="footer-inner">
                <p>© 2026 Advika Rathi</p>
                <p>Babson College · Class of 2027</p>
            </div>
        </footer>
    </div>

    <script>
        const nav = document.getElementById('main-nav');
        const toggle = nav.querySelector('.nav-toggle');

        toggle.addEventListener('click', function () {
            const isOpen = nav.classList.toggle('nav-open');
            toggle.setAttribute('aria-expanded', isOpen);
        });

        nav.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
                nav.classList.remove('nav-open');
                toggle.setAttribute('aria-expanded', 'false');
            });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Checkout</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f7f0ff, #eef9f2);
      color: #202124;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(92%, 560px);
      padding: 32px;
      border-radius: 22px;
      background: white;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    p {
      color: #5f6368;
      line-height: 1.5;
    }

    .checkout {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: bold;
    }

    input[type="number"] {
      padding: 14px;
      border: 2px solid #d8dce3;
      border-radius: 12px;
      font-size: 1.1rem;
    }

    input[type="number"]:focus {
      border-color: #7c3aed;
      outline: none;
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border-radius: 12px;
      background: #f8f5ff;
      font-weight: bold;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }

    button:hover {
      background: #5b21b6;
    }

    .summary {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 14px;
      background: #f6f7fb;
    }

    .summary div {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .final-price {
      padding-top: 10px;
      border-top: 1px solid #dfe3eb;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main>
    <h1>Discount Checkout</h1>
    <p>Enter a cart total and choose whether the shopper is a member. The page will calculate the discount and final price.</p>

    <section class="checkout" aria-label="Discount checkout calculator">
      <label for="cart-total">
        Cart total
        <input id="cart-total" type="number" min="0" step="0.01" placeholder="Example: 100">
      </label>

      <label class="member-row" for="member">
        <input id="member" type="checkbox">
        Shopper is a member
      </label>

      <button id="calculate-button" type="button">Calculate Discount</button>

      <section class="summary" aria-live="polite">
        <div>
          <span>Discount percent</span>
          <span id="discount-percent">0%</span>
        </div>
        <div>
          <span>Discount amount</span>
          <span id="discount-amount">$0.00</span>
        </div>
        <div class="final-price">
          <span>Final price</span>
          <span id="final-price">$0.00</span>
        </div>
      </section>
    </section>
  </main>

  <script>
    const totalInput = document.getElementById('cart-total');
    const memberCheckbox = document.getElementById('member');
    const calculateButton = document.getElementById('calculate-button');
    const discountPercent = document.getElementById('discount-percent');
    const discountAmount = document.getElementById('discount-amount');
    const finalPrice = document.getElementById('final-price');

    function getDiscount(total, isMember) {
      if (total >= 100 && isMember) {
        return 20;
      } else if (total >= 100 || isMember) {
        return 10;
      } else {
        return 0;
      }
    }

    function formatMoney(amount) {
      return `$${amount.toFixed(2)}`;
    }

    function updateCheckout() {
      const total = Number(totalInput.value);
      const isMember = memberCheckbox.checked;

      if (totalInput.value === '' || total < 0) {
        discountPercent.textContent = '0%';
        discountAmount.textContent = '$0.00';
        finalPrice.textContent = '$0.00';
        return;
      }

      const percent = getDiscount(total, isMember);
      const savings = total * percent / 100;
      const finalTotal = total - savings;

      discountPercent.textContent = `${percent}%`;
      discountAmount.textContent = formatMoney(savings);
      finalPrice.textContent = formatMoney(finalTotal);
    }

    totalInput.addEventListener('input', updateCheckout);
    memberCheckbox.addEventListener('change', updateCheckout);
    calculateButton.addEventListener('click', updateCheckout);
  </script>
</body>
</html>

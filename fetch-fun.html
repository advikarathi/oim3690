<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Something Fun</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f7ff, #fff3e8);
      color: #222;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(90%, 520px);
      padding: 32px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 24px 0;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #3578e5;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }

    button:hover {
      background: #225db5;
    }

    button.secondary {
      background: #e58a35;
    }

    button.secondary:hover {
      background: #b5691f;
    }

    #result {
      min-height: 28px;
      padding: 14px;
      border-radius: 12px;
      background: #f5f7fb;
      font-weight: bold;
      word-break: break-word;
    }

    #result img {
      display: block;
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Fetch Something Fun</h1>
    <p>Click a button to fetch data from a public API.</p>

    <section class="buttons">
      <button id="dog-button" type="button">🐶 Random Dog</button>
      <button id="joke-button" type="button">😂 Programming Joke</button>
      <button id="advice-button" type="button">💡 Random Advice</button>
      <button id="surprise-button" class="secondary" type="button">🎲 Surprise Me</button>
    </section>

    <div id="result" aria-live="polite">Click a button to see something fun.</div>
  </main>

  <script>
    const result = document.getElementById('result');

    async function fetchDog() {
      result.textContent = 'Fetching a dog...';
      try {
        const response = await fetch('https://dog.ceo/api/breeds/image/random');
        const data = await response.json();
        result.innerHTML = '';
        const img = document.createElement('img');
        img.src = data.message;
        img.alt = 'A random dog';
        result.appendChild(img);
      } catch (error) {
        result.textContent = `Something went wrong: ${error.message}`;
      }
    }

    async function fetchJoke() {
      result.textContent = 'Fetching a joke...';
      try {
        const response = await fetch('https://v2.jokeapi.dev/joke/Programming?type=single');
        const data = await response.json();
        result.textContent = data.joke;
      } catch (error) {
        result.textContent = `Something went wrong: ${error.message}`;
      }
    }

    async function fetchAdvice() {
      result.textContent = 'Fetching advice...';
      try {
        const response = await fetch('https://api.adviceslip.com/advice');
        const data = await response.json();
        result.textContent = data.slip.advice;
      } catch (error) {
        result.textContent = `Something went wrong: ${error.message}`;
      }
    }

    const surprises = [fetchJoke, fetchAdvice];
    let lastSurprise = -1;

    function surpriseMe() {
      let index = Math.floor(Math.random() * surprises.length);
      if (surprises.length > 1 && index === lastSurprise) {
        index = (index + 1) % surprises.length;
      }
      lastSurprise = index;
      surprises[index]();
    }

    document.getElementById('dog-button').addEventListener('click', fetchDog);
    document.getElementById('joke-button').addEventListener('click', fetchJoke);
    document.getElementById('advice-button').addEventListener('click', fetchAdvice);
    document.getElementById('surprise-button').addEventListener('click', surpriseMe);
  </script>
</body>
</html>
